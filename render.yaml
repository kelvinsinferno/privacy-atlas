services:
  - type: web
    runtime: docker
    name: privacy-atlas-hermes
    region: oregon
    # Created as free because the Render API returned "Payment information is
    # required" for starter on this workspace. Upgrade this service to starter
    # in Render after billing is attached if reliable real-time webhooks matter.
    plan: free
    branch: main
    dockerfilePath: deploy/hermes-render/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    domains:
      - hermes.privacyatlas.xyz
    envVars:
      - key: MAINTAINER_API_KEY
        sync: false
      - key: HERMES_WEBHOOK_SECRET
        sync: false
      - key: HERMES_MODEL_PROVIDER
        value: xai
      - key: HERMES_MODEL
        value: grok-4.3
      - key: XAI_API_KEY
        sync: false
      - key: ENABLE_MAINTAINER_POLL
        value: "true"
      - key: MAINTAINER_POLL_SECONDS
        value: "1800"
