<!doctype html>
<html><head><meta charset="utf-8" /><title>form fixture</title></head>
<body>
  <form>
    <label>Email <input id="email" type="email" autocomplete="email" /></label>
    <label>Card <input id="card" autocomplete="cc-number" /></label>
    <label>Phone <input id="phone" type="tel" /></label>
    <label>Address <input id="addr" autocomplete="street-address" /></label>
    <label>Search <input id="search" type="search" /></label>
    <label>Password <input id="pw" type="password" /></label>
  </form>
</body></html>
