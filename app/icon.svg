<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <rect width="160" height="160" fill="#0b0e13"/>
  <!-- Globe mark, centered at (80,80), scaled 0.72 from stacked logo r=78 globe -->
  <g transform="translate(80,80) scale(0.72)">
    <circle cx="0" cy="0" r="78" fill="none" stroke="#2a5d63" stroke-width="3.5"/>
    <ellipse cx="0" cy="0" rx="34" ry="78" fill="none" stroke="#1d3336" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="62" ry="78" fill="none" stroke="#1d3336" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="78" ry="30" fill="none" stroke="#1d3336" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="78" ry="58" fill="none" stroke="#1d3336" stroke-width="2"/>
    <!-- Lit path -->
    <line x1="0" y1="-78" x2="60.1" y2="-19.1" stroke="#5fd3c8" stroke-width="3"/>
    <line x1="60.1" y1="-19.1" x2="24" y2="55.2" stroke="#2a5d63" stroke-width="2.5"/>
    <line x1="24" y1="55.2" x2="-51.4" y2="43.6" stroke="#1d3336" stroke-width="2.5"/>
    <!-- Domain nodes -->
    <circle cx="0" cy="-78" r="8" fill="#5fd3c8"/>
    <circle cx="0" cy="-78" r="14" fill="none" stroke="#5fd3c8" stroke-opacity="0.3" stroke-width="2.5"/>
    <circle cx="60.1" cy="-19.1" r="6.5" fill="#f0a868"/>
    <circle cx="24" cy="55.2" r="6" fill="#8ce29a"/>
    <circle cx="-51.4" cy="43.6" r="6.5" fill="#7fb2ff"/>
    <circle cx="-60.1" cy="-19.1" r="6" fill="#0b0e13" stroke="#d98ad9" stroke-width="2.5"/>
    <circle cx="-24" cy="-55.2" r="6" fill="#0b0e13" stroke="#e8d9a0" stroke-width="2.5"/>
    <circle cx="0" cy="78" r="6" fill="#0b0e13" stroke="#c9c2b6" stroke-width="2.5"/>
    <!-- Threat diamond -->
    <rect x="72.5" y="-5.5" width="11" height="11" transform="rotate(45 78 0)" fill="#0b0e13" stroke="#5fd3c8" stroke-width="2.5"/>
  </g>
</svg>
