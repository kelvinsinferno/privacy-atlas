<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" width="560" height="380">
  <rect width="560" height="380" fill="#0b0e13"/>
  <!-- GLOBE GRAPH — an atlas whose meridians are the web; the lit nodes are moves across all seven domains -->
  <g transform="translate(280,140)">
    <circle cx="0" cy="0" r="78" fill="none" stroke="#2a5d63" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="34" ry="78" fill="none" stroke="#1d3336" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="62" ry="78" fill="none" stroke="#1d3336" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="78" ry="30" fill="none" stroke="#1d3336" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="78" ry="58" fill="none" stroke="#1d3336" stroke-width="1.5"/>

    <!-- the lit path: a journey crossing domains -->
    <line x1="0" y1="-78" x2="60.1" y2="-19.1" stroke="#5fd3c8" stroke-width="2.2"/>
    <line x1="60.1" y1="-19.1" x2="24" y2="55.2" stroke="#2a5d63" stroke-width="2"/>
    <line x1="24" y1="55.2" x2="-51.4" y2="43.6" stroke="#1d3336" stroke-width="2"/>

    <!-- completed moves, one per domain (filled = done, hollow = waiting) -->
    <circle cx="0" cy="-78" r="7" fill="#5fd3c8"/>
    <circle cx="0" cy="-78" r="12.5" fill="none" stroke="#5fd3c8" stroke-opacity="0.3" stroke-width="2"/>
    <circle cx="60.1" cy="-19.1" r="5.5" fill="#f0a868"/>
    <circle cx="24" cy="55.2" r="5" fill="#8ce29a"/>
    <circle cx="-51.4" cy="43.6" r="5.5" fill="#7fb2ff"/>
    <circle cx="-60.1" cy="-19.1" r="5" fill="#0b0e13" stroke="#d98ad9" stroke-width="2.2"/>
    <circle cx="-24" cy="-55.2" r="5" fill="#0b0e13" stroke="#e8d9a0" stroke-width="2.2"/>
    <circle cx="0" cy="78" r="5" fill="#0b0e13" stroke="#c9c2b6" stroke-width="2.2"/>

    <!-- one threat at the border, already countered: diamond gone teal -->
    <rect x="72.5" y="-5.5" width="11" height="11" transform="rotate(45 78 0)" fill="#0b0e13" stroke="#5fd3c8" stroke-width="2"/>
  </g>
  <text x="280" y="306" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="30" letter-spacing="10" fill="#e8ecf4">PRIVACY ATLAS</text>
  <text x="280" y="336" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="11" letter-spacing="4" fill="#7c8494">PRIVACY IS A WEB · NOT A CHECKLIST</text>
</svg>
